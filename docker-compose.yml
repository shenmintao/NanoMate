x-common-config: &common-config
  image: ghcr.io/shenmintao/nanobot:latest
  volumes:
    - ./data:/home/nanobot/.nanobot
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    network_mode: host
    environment:
      - HTTP_PROXY=http://192.168.10.50:1080
      - HTTPS_PROXY=http://192.168.10.50:1080
      - NO_PROXY=localhost,127.0.0.1,192.168.0.0/16
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-api:
    container_name: nanobot-api
    <<: *common-config
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot/api-workspace"]
    restart: unless-stopped
    ports:
      - 127.0.0.1:8900:8900
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

  nanobot-bridge:
    image: ghcr.io/shenmintao/nanobot:latest
    container_name: nanobot-bridge
    volumes:
      - ./data:/home/nanobot/.nanobot
    working_dir: /app/bridge
    entrypoint: []
    command: ["npm", "start"]
    restart: unless-stopped
    network_mode: host
    environment:
      - BRIDGE_PORT=3002
      - HTTP_PROXY=http://192.168.10.50:1080
      - HTTPS_PROXY=http://192.168.10.50:1080
      - NO_PROXY=localhost,127.0.0.1,192.168.0.0/16

